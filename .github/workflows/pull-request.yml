name: Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.21'

      - name: Install golint
        run: go install golang.org/x/lint/golint@latest

      - name: Formatting
        run: go fmt ./...

      - name: Vetting
        run: go vet ./...

      - name: Linting
        run: golint ./...

  tests:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.21'

      - name: Build
        run: go build -v cmd/dbot/main.go

      - name: Unit Tests
        run: go test -v ./...

      - name: Code Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

